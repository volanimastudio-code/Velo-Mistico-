<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Velo Mistico</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#8B5CF6">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0B0B0F;
      color: white;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      padding: 48px 24px 32px;
      text-align: center;
    }

    h1 {
      color: #8B5CF6;
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: #a1a1aa;
      font-size: 1rem;
      margin-top: 8px;
    }

    .contact-section {
      width: 100%;
      max-width: 560px;
      padding: 0 24px 64px;
    }

    .contact-section h2 {
      color: #8B5CF6;
      font-size: 1.5rem;
      margin-bottom: 24px;
      text-align: center;
    }

    form {
      background: #16161a;
      border: 1px solid #2a2a32;
      border-radius: 12px;
      padding: 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.875rem;
      color: #d4d4d8;
      font-weight: 600;
    }

    input,
    textarea {
      background: #1e1e24;
      border: 1px solid #3a3a44;
      border-radius: 8px;
      padding: 12px 16px;
      color: white;
      font-family: Arial, sans-serif;
      font-size: 1rem;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
      outline: none;
    }

    input:focus,
    textarea:focus {
      border-color: #8B5CF6;
      box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.15);
    }

    input::placeholder,
    textarea::placeholder {
      color: #6b6b78;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
    }

    button[type="submit"] {
      background: #8B5CF6;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 14px 24px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.1s ease;
    }

    button[type="submit"]:hover {
      background: #7c3aed;
    }

    button[type="submit"]:active {
      transform: scale(0.98);
    }

    .form-status {
      text-align: center;
      font-size: 0.875rem;
      min-height: 20px;
    }

    .form-status.success {
      color: #4ade80;
    }

    .form-status.error {
      color: #f87171;
    }

    @media (max-width: 480px) {
      h1 { font-size: 1.75rem; }
      form { padding: 24px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>Velo Mistico</h1>
    <p class="subtitle">App caricata con successo!</p>
  </header>

  <section class="contact-section">
    <h2>Contattaci</h2>
    <form action="https://formsubmit.co/volanimastudio@gmail.com" method="POST" id="contactForm">
      <input type="hidden" name="_subject" value="Nuovo messaggio da Velo Mistico">
      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_template" value="table">
      <input type="text" name="_honey" style="display:none">

      <div class="form-group">
        <label for="name">Nome</label>
        <input type="text" id="name" name="name" placeholder="Il tuo nome" required>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="la-tua@email.com" required>
      </div>

      <div class="form-group">
        <label for="message">Messaggio</label>
        <textarea id="message" name="message" placeholder="Scrivi il tuo messaggio..." required></textarea>
      </div>

      <button type="submit">Invia Messaggio</button>
      <p class="form-status" id="formStatus"></p>
    </form>
  </section>

  <script>
    const form = document.getElementById('contactForm');
    const status = document.getElementById('formStatus');

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      const btn = form.querySelector('button[type="submit"]');
      btn.disabled = true;
      btn.textContent = 'Invio in corso...';
      status.textContent = '';
      status.className = 'form-status';

      try {
        const res = await fetch(form.action, {
          method: 'POST',
          body: new FormData(form),
          headers: { 'Accept': 'application/json' }
        });

        if (res.ok) {
          status.textContent = 'Messaggio inviato con successo!';
          status.className = 'form-status success';
          form.reset();
        } else {
          throw new Error();
        }
      } catch {
        status.textContent = 'Errore nell\'invio. Riprova.';
        status.className = 'form-status error';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Invia Messaggio';
      }
    });
  </script>
</body>
</html>
